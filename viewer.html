<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Report Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="viewer-body">
  <header class="viewer-toolbar">
    <div class="toolbar-brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1 id="doc-title">Match Report Converter</h1>
      </div>
      <span class="header-separator">·</span>
      <a href="https://www.linkedin.com/in/rodrigokajioka/" target="_blank" rel="noopener noreferrer" class="dev-credit-header">Developed by Rodrigo Pantuffi</a>
      <span id="page-count" class="meta-badge"></span>
    </div>
    <div class="toolbar-toggle" id="view-toggle" hidden>
      <span class="toggle-label" id="toggle-label-original">Original</span>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-converted" checked />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </label>
      <span class="toggle-label toggle-label--active" id="toggle-label-converted">Converted</span>
    </div>
  </header>

  <div id="loading" class="loading" hidden>
    <div class="loading-spinner"></div>
    <p>Loading PDF…</p>
  </div>

  <div id="error" class="error-banner" hidden></div>

  <main id="layout" class="layout" hidden>
    <div id="disclaimer" class="disclaimer-banner" role="note" hidden>
      <svg class="disclaimer-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="16" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12.01" y2="8"/>
      </svg>
      <span>Converted times are for reference only — this is not an official match report.</span>
    </div>
    <div id="warning" class="warning-banner" hidden></div>
    <section id="pdf-column" class="pdf-column" aria-label="PDF pages"></section>
    <footer class="viewer-footer">
      <a href="https://www.linkedin.com/in/rodrigokajioka/" target="_blank" rel="noopener noreferrer" class="dev-credit-footer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Developed by Rodrigo Pantuffi
      </a>
    </footer>
  </main>

  <!-- Hidden legacy elements to prevent JS errors -->
  <form id="url-form" hidden><input type="url" id="pdf-url" /><datalist id="recent-urls"></datalist></form>
  <button id="btn-clear-history" hidden></button>

  <script src="lib/pdf.min.js" id="pdfjs-script"></script>
  <script src="conversion.js"></script>
  <script src="pdf-fetch.js"></script>
  <script src="link-history.js"></script>
  <script src="canvas-sampling.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
